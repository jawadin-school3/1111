<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الحب</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6f2; /* لون خلفية وردي فاتح */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(255, 105, 180, 0.2);
            text-align: center;
            width: 320px;
        }

        h2 {
            color: #ff4d94;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #display {
            width: 90%;
            height: 60px;
            font-size: 26px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #ffb3d9;
            border-radius: 12px;
            background-color: #fff0f5;
            color: #cc0052;
            font-weight: bold;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff66a3;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff3385;
            transform: scale(1.05);
        }

        .operator {
            background-color: #ff99c2;
        }

        .operator:hover {
            background-color: #ff4d94;
        }

        .wide {
            grid-column: span 2;
            background-color: #ff4d94;
        }

        .wide:hover {
            background-color: #e6005c;
        }

        .clear {
            background-color: #cccccc;
            color: #333;
        }

        .clear:hover {
            background-color: #b3b3b3;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>حاسبة  </h2>
        <input type="text" id="display" disabled>
        
        <div class="buttons">
            <button onclick="appendValue('اسحاق')">اسحاق</button>
            <button onclick="appendValue('محمود')">محمود</button>
            <button class="operator wide" onclick="appendValue(' + ')">جمع (+)</button>
            <button class="wide" onclick="calculate()">النتيجة (=)</button>
            <button class="clear wide" onclick="clearDisplay()">مسح الشاشة</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // دالة لإضافة الكلمات للشاشة
        function appendValue(value) {
            // إذا كانت الشاشة تعرض النتيجة النهائية، امسحها أولاً عند ضغط زر جديد
            if (display.value.includes('حب ابدي') || display.value === 'جرب مرة ثانية!') {
                display.value = '';
            }
            display.value += value;
        }

        // دالة لمسح الشاشة
        function clearDisplay() {
            display.value = '';
        }

        // دالة حساب النتيجة
        function calculate() {
            const exp = display.value.trim();
            
            // التحقق مما إذا كانت المعادلة هي "اسحاق + محمود" أو العكس
            if (exp === 'اسحاق + محمود' || exp === 'محمود + اسحاق') {
                display.value = 'واحد يحب واحد';
            } else if (exp === '') {
                display.value = '';
            } else {
                // في حال إدخال أي شيء آخر
                display.value = 'جرب مرة ثانية!';
            }
        }
    </script>

</body>
</html>
